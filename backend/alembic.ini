# Alembic Configuration File
# Generated by: alembic init

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
# file_template = %%(created_at)s_%%(rev)s_%%(slug)s

# sys.path path separator, as used in the mangling of imports in the env.py file
# when the target is in script mode. Valid values for macOS/Linux: `:` and Windows: `;`
path_separator = :

# set to 'true' to run the environment during the 'revision' command
# (Used for autogenerate changes - set to False to prevent accidental auto-commit)
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy.pool,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.pool]
level = WARN
handlers =
qualname = sqlalchemy.pool

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
